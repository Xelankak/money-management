<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Money Management - Full Feature</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>body { background-color: #0b1120; color: #f8fafc; font-family: sans-serif; }</style>
</head>
<body class="min-h-screen flex">

    <div class="w-64 bg-[#0f172a] p-6 border-r border-slate-800 flex flex-col">
        <h1 class="font-bold text-lg mb-8 text-indigo-400">Money Management</h1>
        <nav class="space-y-2 flex-1">
            <a href="#" class="block bg-slate-800 px-4 py-2 rounded-lg text-sm">Dashboard</a>
            <a href="#" class="block text-slate-400 hover:text-white px-4 py-2 rounded-lg text-sm">Rekening</a>
            <a href="#" class="block text-slate-400 hover:text-white px-4 py-2 rounded-lg text-sm">Transaksi</a>
            <a href="#" class="block text-slate-400 hover:text-white px-4 py-2 rounded-lg text-sm">Aset & Investasi</a>
            <a href="#" class="block text-slate-400 hover:text-white px-4 py-2 rounded-lg text-sm">Laporan</a>
        </nav>
    </div>

    <div class="flex-1 p-8">
        <div class="mb-8">
            <h2 class="text-2xl font-bold">Halo, Alvian!</h2>
            <p class="text-slate-400">Kelola keuangan, rekening, dan aset investasi kamu di satu tempat.</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <button onclick="bukaModal('transaksi')" class="bg-indigo-600 p-4 rounded-xl text-left hover:bg-indigo-700 transition">
                <span class="block font-bold">+ Input Transaksi</span>
                <span class="text-xs text-indigo-200">Catat pemasukan/pengeluaran</span>
            </button>
            <button onclick="bukaModal('rekening')" class="bg-emerald-600 p-4 rounded-xl text-left hover:bg-emerald-700 transition">
                <span class="block font-bold">+ Tambah Rekening</span>
                <span class="text-xs text-emerald-200">BCA, Dana, OVO, dll</span>
            </button>
            <button onclick="bukaModal('aset')" class="bg-amber-600 p-4 rounded-xl text-left hover:bg-amber-700 transition">
                <span class="block font-bold">+ Tambah Aset</span>
                <span class="text-xs text-amber-200">Bitcoin, Ruko, dll</span>
            </button>
        </div>

        <div class="bg-[#131c35] p-6 rounded-2xl border border-slate-800">
            <h3 class="font-bold mb-4">Ringkasan Utama</h3>
            <div id="konten-utama" class="text-slate-400 text-sm italic">
                Data akan dimuat dari Supabase...
            </div>
        </div>
    </div>

    <script>
        function bukaModal(jenis) {
            alert("Fitur " + jenis + " akan segera diaktifkan. Pastikan tabel di Supabase sudah dibuat.");
            // Di sini nanti kita tambahkan fungsi untuk menampilkan form input
        }
    </script>
</body>
</html>
